<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Music</title>
    <link rel="icon" href="/spotify.png" type="image/png" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/mainLayout.css" />
    <link rel="stylesheet" href="/css/scale.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="logo">
          <h1>App Music</h1>
        </div>
        <div>
          <label class="upload-label" for="fileInput">
            <span>Upload Mp3 Files</span>
            <input
              id="fileInput"
              type="file"
              multiple
              id="fileInput"
              accept=".mp3,.mp4,audio/mpeg"
            />
          </label>
        </div>
      </header>
      <main class="main-layout">
        <section class="playlist-panel panel">
          <div class="panel-header">
            <h2>Playlist</h2>
            <span id="playListCount">0 bài hát</span>
          </div>
          <div id="songlist" class="song-list">
            <p class="empty-text">
              Chưa có bài hát nào. Hãy tải lên các file mp3 để bắt đầu.
            </p>
          </div>
        </section>
        <section class="player-panel panel">
          <div class="panel-header">
            <h2>Now Playing</h2>
          </div>
          <div class="cover-box">
            <div class="fake-cover"><img /></div>
          </div>
          <div class="current-song-box">
            <p class="current-song-name" id="currentSongName">
              Chưa có bài hát nào được chọn
            </p>
            <p class="muted-text">Local Music Player</p>
          </div>
          <div class="control-group">
            <button id="togglePlayBtn" class="btn btn-primary">Play</button>
            <button id="playFavoritesBtn" class="btn">Favorites</button>
            <button id="shuffleFavoritesBtn" class="btn">
              Shuffle Favorites
            </button>
          </div>
          <div class="stats-grid">
            <div class="stat-card">
              <span class="muted-text">Tổng bài hát:</span>
              <strong id="totalSongs">0</strong>
            </div>
            <div class="stat-card">
              <span class="muted-text">Favorite</span>
              <strong id="totalFavorites">0</strong>
            </div>
          </div>
        </section>
      </main>
      <footer class="bottom-player" id="mainFooter" style="display: none">
        <div class="bottom-player-info">
          <div id="miniCoverContainer" class="mini-cover">
            <img id="bottomCover" class="player-mini-img" src="" alt="cover" />
          </div>
        </div>

        <div class="custom-player">
          <div class="song-info-top">
            <div class="marquee-wrapper">
              <p id="bottomCurrentSong" class="bottom-song-name">
                Chưa có bài nào được phát
              </p>
              <p id="bottomCurrentSongClone" class="bottom-song-name clone">
                Chưa có bài nào được phát
              </p>
            </div>
          </div>

          <div class="progress-area">
            <div class="progress-bar">
              <div class="buffered-line"></div>
              <div class="current-line"></div>
            </div>
            <div class="time-display">
              <span id="currentTime">0:00</span>
              <span id="duration">0:00</span>
            </div>
          </div>

          <div class="main-controls">
            <button id="prevBtn" class="btn-nav" title="Previous">⏮</button>
            <button id="mainPlayBtn" class="btn-play-main">▶</button>
            <button id="nextBtn" class="btn-nav" title="Next">⏭</button>
            <button id="repeatBtn" class="btn-nav" title="Repeat">
              <i class="fa-solid fa-repeat"></i>
            </button>
          </div>
        </div>
        <audio id="audioPlayer" hidden class="audio-player"></audio>
      </footer>
    </div>
    <script src="js/handlefile.js" type="module" defer></script>
  </body>
</html>
